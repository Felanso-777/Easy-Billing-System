<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Billing</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
             <a class="navbar-brand" href="/">Stock&Bill it...</a>
        <div>
            <a class="btn btn-light mx-1" href="/">Home</a>
            <a class="btn btn-light mx-1" href="/add_product">Add Product</a>
            <a class="btn btn-light mx-1" href="/products">View Products</a>
            <a class="btn btn-light mx-1" href="/billing">Bill it</a>   
        </div>
        </div>
    </nav>

    <div class="container-mt-5">
        <h2 class="text-center">Billing System</h2>
        <div class="row">
            <!--Product list-->
            <div class="col-md-6">
                <h4>Products</h4>
                <ul class="list-group">
                    {%for products in product%}
                    <li class="list-group-item fw-bold">
                        {{products[1]}} - ₹{{products[2]}}
                        <button  type="button" class="btn btn-success btn-sm float-end"
                        onclick="addtobill('{{products[1]}}',{{products[2]}})">add</button><!-- function parameter have ('apple',50) the content in single quote taken as string thats why second one taken as number-->
                    </li>
                    {%endfor%}
                </ul>
            </div>
            <div class="col-md-6">
                <h4>Bill it</h4>
                <ul id="Bill-list" class="list-group"></ul>
                    <h2 class = "mt-3">Total :₹<span id ="total">0</span></h2> 
                    <button class="btn btn-sm btn-warning" onclick="clearall()">clear all</button>
            </div>
        </div>
    </div>
    <script>
        let bill={};
        let total = 0;
        function addtobill(name,price){
            //if product alredy exists
            if(bill[name]){
                bill[name].quantity +=1;
            }
            else
            {
                bill[name]={
                    price:price,
                    quantity:1
                };
            }
            updateBillUI();
            
        }
        function updateBillUI(){
            let billlist=document.getElementById("Bill-list");
            billlist.innerHTML="";//clear previous list
            total=0;
            for (let name in bill){
                let item =bill[name];
                let li= document.createElement("li");
                li.className = "list-group-item";
                let itemTotal = item.price*item.quantity;
                total +=itemTotal;
                li.innerHTML = `
            ${name}
            <button class="btn btn-secondary btn-sm"
                onclick="decreaseitem('${name}')">-</button>
            (x${item.quantity})
            <button class="btn btn-secondary btn-sm"
                onclick="addtobill('${name}',${item.price})">+</button>
            - ₹${itemTotal}
            <button class="btn btn-danger btn-sm float-end"
                onclick="removeItem('${name}')">
                Remove
            </button>
        `;
                billlist.appendChild(li);
            }
                document.getElementById("total").innerText=total;
            }
            function removeItem(name){
                delete bill[name];
                updateBillUI();
            }
            function decreaseitem(name){
                if(bill[name]){
                    bill[name].quantity -=1;
                }
                if(bill[name].quantity<=0){
                    delete bill[name];
                }
                updateBillUI();
            }
            function clearall(){
                bill={};
                total=0;
                updateBillUI();
            }
    </script>
</body>
</html>
